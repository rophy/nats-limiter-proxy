listen: 0.0.0.0:4222
http: 0.0.0.0:8222

# JWT Authentication
operator: "/jwt/operator.jwt"

resolver: {
  type: full
  dir: "/jwt"
  allow_delete: false
  interval: "2m"
}

# Note: With JWT operator enabled, traditional username/password auth
# is handled by the proxy layer, not the NATS server directly.
# The proxy extracts usernames from both JWT and password auth,
# then applies rate limiting before forwarding to NATS.